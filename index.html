<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>极客对比</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', '微软雅黑', sans-serif;
            background: #F5F7FA;
            color: #1F2937;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* 配色 */
        :root {
            --primary: #1677FF;
            --primary-hover: #0c5ed7;
            --dark-bg: #1e293b;
            --gray-bg: #F8FAFE;
            --border-light: #E9EDF2;
            --text-muted: #5B6E8C;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.05);
            --card-hover: 0 20px 30px -12px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 导航 */
        .navbar {
            background: #FFFFFF;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 200;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.96);
        }
        .nav-inner {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            gap: 20px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1677FF, #4F9EFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span { font-weight: 400; font-size: 0.8rem; color: var(--text-muted); background: none; -webkit-background-clip: unset; }
        .nav-links { display: flex; gap: 28px; font-weight: 500; }
        .nav-links a { text-decoration: none; color: #1F2937; transition: 0.2s; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }

        /* 全屏轮播 */
        .hero-carousel {
            position: relative;
            height: 460px;
            overflow: hidden;
            border-radius: 28px;
            margin: 28px 0 32px;
            background: #00000010;
        }
        .carousel-slides {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.5s ease;
        }
        .slide {
            width: 33.333%;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding-left: 60px;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .slide1 { background-image: linear-gradient(95deg, #0f2027, #203a43, #2c5364), url('https://picsum.photos/id/0/1600/500'); background-blend-mode: overlay; }
        .slide2 { background-image: linear-gradient(95deg, #1f1c2c, #302b3e), url('https://picsum.photos/id/20/1600/500'); background-blend-mode: overlay; }
        .slide3 { background-image: linear-gradient(95deg, #141e30, #243b55), url('https://picsum.photos/id/106/1600/500'); background-blend-mode: overlay; }
        .carousel-dots { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; }
        .dot { display: inline-block; width: 10px; height: 10px; background: white; border-radius: 10px; margin: 0 6px; opacity: 0.5; cursor: pointer; }
        .dot.active { opacity: 1; width: 24px; background: var(--primary); }

        /* 分类卡片区 */
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 48px 0 24px;
            position: relative;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .category-card {
            background: white;
            border-radius: 28px;
            padding: 24px 12px;
            text-align: center;
            transition: 0.25s;
            border: 1px solid var(--border-light);
            cursor: pointer;
            box-shadow: var(--card-shadow);
        }
        .category-card:hover { transform: translateY(-6px); box-shadow: var(--card-hover); border-color: var(--primary); }
        .category-emoji { font-size: 2.4rem; margin-bottom: 12px; }
        .category-name { font-weight: 600; font-size: 1.1rem; }

        /* 产品卡片橱窗 */
        .product-scroll {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin: 20px 0 32px;
        }
        .product-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            transition: 0.2s;
            border: 1px solid var(--border-light);
            box-shadow: var(--card-shadow);
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: var(--card-hover); }
        .product-img { font-size: 3rem; text-align: center; }
        .product-title { font-weight: 700; font-size: 1.1rem; margin: 8px 0 4px; }
        .price { font-weight: 700; color: var(--primary); margin: 6px 0; }
        .card-actions { display: flex; gap: 10px; margin-top: 14px; }
        .btn-sm { background: #F1F5F9; border: none; padding: 6px 12px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 500; cursor: pointer; }

        /* 底部对比栏 */
        .compare-bar {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: #1e293b; backdrop-filter: blur(20px);
            border-radius: 60px; padding: 12px 24px; color: white;
            display: flex; flex-wrap: wrap; justify-content: space-between; z-index: 300;
            box-shadow: 0 8px 28px rgba(0,0,0,0.3);
        }
        /* 模态框 */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; max-width: 1300px; width: 92%; max-height: 85vh; overflow: auto;
            border-radius: 32px; padding: 28px; position: relative;
        }
        .diff-highlight { background-color: #EFF6FF; color: #1677FF; font-weight: 700; border-left: 3px solid #1677FF; }
        .param-comment { font-size: 0.7rem; color: #6c757d; display: block; margin-top: 4px; }

        /* 品牌墙 */
        .brand-wall { display: flex; flex-wrap: wrap; gap: 16px; margin: 32px 0; justify-content: center; }
        .brand-badge { background: white; border-radius: 40px; padding: 8px 22px; font-weight: 500; border: 1px solid var(--border-light); }

        footer { text-align: center; padding: 48px 0 24px; color: var(--text-muted); border-top: 1px solid var(--border-light); margin-top: 40px; }

        @media (max-width: 780px) { .hero-carousel { height: 280px; } .slide { padding-left: 20px; } }
    </style>
</head>
<body>
<div class="navbar">
    <div class="container nav-inner">
        <div class="logo">极客对比<span> · 纯净参数工具</span></div>
        <div class="nav-links">
            <a data-page="home" class="active">首页</a>
            <a data-page="products">全部分类</a>
            <a data-page="brands">品牌大全</a>
            <a data-page="guide">选购攻略</a>
        </div>
    </div>
</div>

<main id="app-root">
    <!-- 动态内容渲染在此 -->
</main>

<div id="compareBar" class="compare-bar" style="display: none;"></div>

<!-- 对比模态框 -->
<div id="compareModal" class="modal"><div class="modal-content" id="compareModalInner"></div></div>
<div id="detailModal" class="modal"><div class="modal-content" id="detailModalInner"></div></div>

<script>
    // ----------------------------- 全品类产品库 (覆盖手机/电视/空调/冰箱/耳机/扫地机等, 无空白) ----------------
    const productsDB = [
        { id:1, name:"iPhone 16 Pro", brand:"Apple", category:"手机", subcat:"数码", price:7999, score:9.3, img:"📱", specs:{ chip:"A18 Pro", ram:"8GB", storage:"256GB", display:"6.3英寸 OLED 120Hz", camera:"48MP+12MP五倍长焦", battery:"3355mAh", charging:"27W+MagSafe"}, pros:"性能极致, 生态强", cons:"充电慢", tags:"旗舰"},
        { id:2, name:"小米14 Ultra", brand:"小米", category:"手机", subcat:"数码", price:6499, score:9.5, specs:{ chip:"骁龙8 Gen3", ram:"16GB", storage:"512GB", display:"6.73英寸 120Hz", camera:"徕卡四摄", battery:"5300mAh", charging:"90W+80W无线"}, pros:"拍照封神,性价比高", cons:"厚重", tags:"影像机皇"},
        { id:3, name:"华为Pura 80 Pro+", brand:"华为", category:"手机", subcat:"数码", price:7999, score:9.2, specs:{ chip:"麒麟9100", ram:"12GB", storage:"512GB", display:"6.8英寸 OLED", camera:"XMAGE超聚光", battery:"5050mAh", charging:"100W"}, pros:"卫星通信, 信号强", cons:"无GMS"},
        { id:4, name:"三星S24 Ultra", brand:"三星", category:"手机", price:9699, score:9.1, specs:{ chip:"骁龙8 Gen3", ram:"12GB", storage:"256GB", display:"6.8英寸 2K", camera:"2亿像素", battery:"5000mAh", charging:"45W"}, pros:"屏幕顶尖,AI功能", cons:"价格高"},
        // 电视类
        { id:5, name:"索尼XR-65A95L", brand:"索尼", category:"电视", subcat:"大家电", price:17999, score:9.6, specs:{ panel:"QD-OLED", refresh:"120Hz", dimming:"像素级", brightness:"峰值1500nit", sound:"Acoustic Surface"}, pros:"画质顶级,游戏体验强", cons:"昂贵"},
        { id:6, name:"海信E8N Ultra", brand:"海信", category:"电视", price:8999, score:9.4, specs:{ panel:"MiniLED", zones:"2000+分区", refresh:"144Hz", brightness:"XDR Pro", sound:"2.1.2"}, pros:"性价比极高,影院感", cons:"系统广告少量"},
        { id:7, name:"TCL Q10K Pro", brand:"TCL", category:"电视", price:10999, score:9.5, specs:{ panel:"MiniLED", zones:"3024", refresh:"144Hz", chip:"M2+TXR"}, pros:"超高分区,亮度惊人", cons:"外观厚重"},
        // 空调
        { id:8, name:"格力云锦三代", brand:"格力", category:"空调", subcat:"大家电", price:3499, score:9.0, specs:{ energy:"新一级能效", capacity:"1.5匹", cooling:"3500W", noise:"18dB", feature:"自清洁"}, pros:"省电静音", cons:"价格稍高"},
        { id:9, name:"美的酷省电Pro", brand:"美的", category:"空调", price:2799, score:9.2, specs:{ energy:"超一级能效", capacity:"1.5匹", cooling:"3510W", feature:"酷省电技术"}, pros:"节能冠军", cons:"塑料感"},
        // 冰箱
        { id:10, name:"海尔零距离自由嵌入", brand:"海尔", category:"冰箱", price:5599, score:9.1, specs:{ type:"十字对开", capacity:"500L", energy:"一级", feature:"EPP超净"}, pros:"零嵌美观", cons:"容量略小"},
        { id:11, name:"容声双净Pro", brand:"容声", category:"冰箱", price:4299, score:9.3, specs:{ capacity:"513L", energy:"一级", fresh:"生熟分储"}, pros:"除菌净味强", cons:"噪音稍大"},
        // 耳机
        { id:12, name:"AirPods Pro 2", brand:"Apple", category:"耳机", price:1899, score:9.4, specs:{ type:"TWS降噪", battery:"6h+24h", chip:"H2", anc:"自适应"}, pros:"生态无敌", cons:"不耐磨"},
        { id:13, name:"索尼WF-1000XM5", brand:"索尼", category:"耳机", price:1999, score:9.3, specs:{ anc:"双芯驱动", battery:"8h+24h", codec:"LDAC"}, pros:"降噪天花板", cons:"佩戴较紧"},
        // 扫地机器人
        { id:14, name:"石头G20S Ultra", brand:"石头", category:"扫地机器人", price:4999, score:9.6, specs:{ suction:"11000Pa", mopping:"双震动", nav:"结构光+AI", autoEmpty:"全能基站"}, pros:"清洁力强,避障顶级", cons:"高价"},
        { id:15, name:"追觅X40 Pro", brand:"追觅", category:"扫地机器人", price:5699, score:9.5, specs:{ suction:"12000Pa", feature:"仿生双机械臂", auto:"全能基站"}, pros:"边角清洁强", cons:"app复杂"},
    ];

    // 为每个产品添加category中文映射，并保证全品类
    const categories = ["手机","电视","空调","冰箱","耳机","扫地机器人"];
    let currentPage = "home";
    let compareList = [];   // 最多4个同品类

    // ---------- UI组件动态渲染 ----------
    const appRoot = document.getElementById("app-root");

    // 轮播html
    function renderHero() {
        return `
            <div class="hero-carousel" id="heroCarousel">
                <div class="carousel-slides" id="carouselSlides">
                    <div class="slide slide1"><div><h1 style="font-size:2.5rem;">数码家电对比新标杆</h1><p>全品类参数 · 纯净无广告</p></div></div>
                    <div class="slide slide2"><div><h1>小白也能看懂参数</h1><p>通俗注解+差异高亮</p></div></div>
                    <div class="slide slide3"><div><h1>全品牌全覆盖</h1><p>电视/冰箱/手机/扫地机一网打尽</p></div></div>
                </div>
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        `;
    }
    function renderCategories() {
        const cats = [{name:"智能手机",emoji:"📱",filter:"手机"},{name:"智能电视",emoji:"📺",filter:"电视"},{name:"空调",emoji:"❄️",filter:"空调"},{name:"冰箱",emoji:"🧊",filter:"冰箱"},{name:"耳机音响",emoji:"🎧",filter:"耳机"},{name:"扫地机器人",emoji:"🤖",filter:"扫地机器人"}];
        return `<div class="section-title">⚡ 全品类快捷入口</div><div class="category-grid">${cats.map(c=>`<div class="category-card" data-cat="${c.filter}"><div class="category-emoji">${c.emoji}</div><div class="category-name">${c.name}</div></div>`).join('')}</div>`;
    }
    function renderHotProducts(title, filterCat, limit=4) {
        let filtered = productsDB.filter(p=>p.category===filterCat).slice(0,limit);
        if(filtered.length===0) filtered = productsDB.slice(0,limit);
        return `<div class="section-title">🔥 ${title}</div><div class="product-scroll">${filtered.map(p=>productCard(p)).join('')}</div>`;
    }
    function productCard(p) {
        return `<div class="product-card" data-id="${p.id}">
            <div class="product-img">${p.img || (p.category==="手机"?"📱":p.category==="电视"?"📺":"📟")}</div>
            <div class="product-title">${p.name}</div>
            <div>${p.brand} · ${p.category}</div>
            <div class="price">¥${p.price.toLocaleString()}</div>
            <div>⭐ 性价比 ${p.score}/10</div>
            <div class="card-actions"><button class="btn-sm compare-btn" data-id="${p.id}">➕ 对比</button><button class="btn-sm detail-btn" data-id="${p.id}">📖 详情</button></div>
        </div>`;
    }
    function renderHome() {
        return `
            ${renderHero()}
            <div class="container">
                ${renderCategories()}
                ${renderHotProducts("📱 热门手机推荐","手机",6)}
                ${renderHotProducts("📺 口碑电视爆款","电视",4)}
                ${renderHotProducts("❄️ 热销空调/冰箱","空调",3)}
                ${renderHotProducts("🎧 数码音频精选","耳机",3)}
                <div class="section-title">🛒 新品速递 · 旗舰扫地机器人</div>
                <div class="product-scroll">${productsDB.filter(p=>p.category==="扫地机器人").slice(0,2).map(p=>productCard(p)).join('')}</div>
                <div class="section-title">📘 选购攻略图文</div>
                <div style="background:#fff; border-radius:28px; padding:24px; margin:20px 0; display:flex; flex-wrap:wrap; gap:20px; justify-content:space-between;">
                    <div><strong>电视选购宝典</strong><p>亮度/分区/刷新率怎么看？</p></div>
                    <div><strong>手机处理器天梯</strong><p>骁龙8 Gen3 vs A17 Pro</p></div>
                    <div><strong>空调匹数与能效</strong><p>省电技巧与避坑</p></div>
                </div>
            </div>
        `;
    }
    // 全品类列表页 (无空白，展示所有产品+筛选)
    function renderProductsPage() {
        let html = `<div class="container"><div class="section-title">📋 全品类产品库 (覆盖数码/大家电/小家电)</div>
        <div class="search-filter" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:28px;">
            <select id="catSelectList"><option value="all">全部分类</option>${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
            <select id="brandSelectList"><option value="all">全部品牌</option>${[...new Set(productsDB.map(p=>p.brand))].map(b=>`<option value="${b}">${b}</option>`).join('')}</select>
            <select id="sortSelectList"><option value="default">默认排序</option><option value="price_asc">价格升序</option><option value="score_desc">性价比高分</option></select>
        </div>
        <div id="dynamicProductList" class="product-scroll"></div></div>`;
        setTimeout(()=>{ refreshProductList(); attachProductEvents();}, 30);
        return html;
    }
    function refreshProductList() {
        let cat = document.getElementById("catSelectList")?.value || "all";
        let brand = document.getElementById("brandSelectList")?.value || "all";
        let sort = document.getElementById("sortSelectList")?.value || "default";
        let filtered = productsDB.filter(p=> (cat==="all" || p.category===cat) && (brand==="all" || p.brand===brand));
        if(sort==="price_asc") filtered.sort((a,b)=>a.price-b.price);
        if(sort==="score_desc") filtered.sort((a,b)=>b.score-a.score);
        const container = document.getElementById("dynamicProductList");
        if(container) container.innerHTML = filtered.map(p=>productCard(p)).join('');
        attachProductEvents();
    }
    function attachProductEvents() {
        document.querySelectorAll(".compare-btn").forEach(btn=> btn.addEventListener("click",(e)=>{ let id = parseInt(btn.dataset.id); addToCompare(id); }));
        document.querySelectorAll(".detail-btn").forEach(btn=> btn.addEventListener("click",(e)=>{ showDetail(parseInt(btn.dataset.id)); }));
    }
    // 品牌大全页
    function renderBrands() {
        const brands = ["Apple","小米","华为","三星","索尼","海信","TCL","格力","美的","海尔","石头","追觅","容声","JBL","漫步者"];
        return `<div class="container"><div class="section-title">🏷️ 合作品牌大全 (全主流数码家电品牌)</div><div class="brand-wall">${brands.map(b=>`<div class="brand-badge">${b}</div>`).join('')}</div>
        <div class="section-title">📌 品牌产品速览</div><div class="product-scroll">${productsDB.slice(0,6).map(p=>productCard(p)).join('')}</div></div>`;
    }
    function renderGuide() {
        return `<div class="container"><div class="section-title">📖 选购科普 · 避坑指南</div>
        <div style="display:grid; gap:24px;">
            <div style="background:white; border-radius:28px; padding:28px;"><h3>📱 手机选购核心参数</h3><p>处理器（性能）、内存（后台留存）、屏幕（护眼/亮度）、快充功率。预算有限优先性价比机型如小米、真我。</p></div>
            <div style="background:white; border-radius:28px; padding:28px;"><h3>📺 电视参数怎么看？</h3><p>分区背光数量、峰值亮度、刷新率（游戏120Hz以上）、色域。MiniLED目前画质性价比最高，索尼/海信/TCL优秀。</p></div>
            <div style="background:white; border-radius:28px; padding:28px;"><h3>❄️ 空调/冰箱能效建议</h3><p>新一级能效最省电，空调匹数根据面积15-20平选1.5匹；冰箱首选风冷无霜，变频更节能。</p></div>
        </div></div>`;
    }
    // 全局对比逻辑
    function addToCompare(productId){
        const prod = productsDB.find(p=>p.id===productId);
        if(!prod) return;
        if(compareList.some(p=>p.id===prod.id)){ alert("已在对比栏"); return; }
        if(compareList.length>=4){ alert("最多对比4款"); return; }
        if(compareList.length>0 && compareList[0].category !== prod.category){ alert(`只能对比同品类 (当前${compareList[0].category})，请清空对比栏后再试`); return; }
        compareList.push(prod);
        updateCompareBar();
    }
    function removeFromCompare(id){
        compareList = compareList.filter(p=>p.id!==id);
        updateCompareBar();
    }
    function updateCompareBar(){
        const barDiv = document.getElementById("compareBar");
        if(compareList.length===0){ barDiv.style.display="none"; return; }
        barDiv.style.display="flex";
        barDiv.innerHTML = `<div style="display:flex; gap:12px; flex-wrap:wrap;">${compareList.map(p=>`<div style="background:#334155; border-radius:40px; padding:6px 16px;">${p.name} <button class="remove-cmp" data-id="${p.id}" style="background:none; border:none; color:#f87171; margin-left:8px;">✖</button></div>`).join('')}</div>
        <div><button id="clearCompareAll" style="background:#475569; border:none; padding:6px 16px; border-radius:40px; color:white;">清空</button>
        <button id="doCompareBtn" style="background:#1677FF; margin-left:12px; border:none; padding:6px 20px; border-radius:40px;">开始对比</button></div>`;
        document.querySelectorAll(".remove-cmp").forEach(btn=> btn.addEventListener("click",(e)=>{ removeFromCompare(parseInt(btn.dataset.id)); }));
        document.getElementById("clearCompareAll")?.addEventListener("click",()=>{ compareList=[]; updateCompareBar(); });
        document.getElementById("doCompareBtn")?.addEventListener("click",()=>showCompareModal());
    }
    function showCompareModal(){
        if(compareList.length<2){ alert("至少选择2款产品对比"); return; }
        const products = compareList;
        let allKeys = new Set(); products.forEach(p=>{ Object.keys(p.specs).forEach(k=>allKeys.add(k)); });
        let paramOrder = ["chip","ram","storage","display","camera","battery","charging","panel","refresh","zones","energy","capacity"];
        let sortedKeys = [...allKeys].sort((a,b)=> (paramOrder.indexOf(a)-paramOrder.indexOf(b)));
        let html = `<h2>📊 横向对比 (${products[0].category}品类)</h2><div style="overflow-x:auto;"><table style="width:100%; border-collapse:collapse;"><thead><tr><th>参数/型号</th>${products.map(p=>`<th>${p.name}</th>`).join('')}</tr></thead><tbody>`;
        sortedKeys.forEach(key=>{
            let values = products.map(p=>p.specs[key]||"—");
            let allEqual = values.every(v=>v===values[0]);
            let row = `<td style="font-weight:600;">${key}</td>`;
            products.forEach((p,idx)=>{
                let val = p.specs[key]||"—";
                let isDiff = (!allEqual && val !== values[0]);
                let comment = (key==="chip" && val!=="—") ? `<span class="param-comment">💡 性能核心</span>` : (key==="charging"&&val!=="—")?"<span class='param-comment'>快充速度参考</span>":"";
                row += `<td class="${isDiff ? 'diff-highlight' : ''}">${val} ${comment}</td>`;
            });
            html += `<tr>${row}</tr>`;
        });
        html += `<tr><td style="font-weight:600;">⭐ 性价比评分</td>${products.map(p=>`<td>${p.score}/10</td>`).join('')}</tr>`;
        html += `<tr><td style="font-weight:600;">✅ 亮点/短板</td>${products.map(p=>`<td><span style="color:green;">👍 ${p.pros||'均衡'}</span><br><span style="color:#b91c1c;">⚠️ ${p.cons||'无明显短板'}</span></td>`).join('')}</tr>`;
        html += `</tbody></table></div><div style="margin-top:20px; display:flex; gap:12px;"><button id="closeCmpModal" class="btn-primary">关闭</button></div>`;
        const modal = document.getElementById("compareModal");
        document.getElementById("compareModalInner").innerHTML = html;
        modal.style.display = "flex";
        document.getElementById("closeCmpModal")?.addEventListener("click",()=>modal.style.display="none");
    }
    function showDetail(id){
        const p = productsDB.find(p=>p.id===id);
        if(!p) return;
        let details = `<h2>${p.name}</h2><div><img style="font-size:3rem;">${p.img||'📦'}</div><p>品牌:${p.brand} 参考价:¥${p.price}</p><p>⭐性价比:${p.score}/10</p><h3>详细参数</h3><ul>${Object.entries(p.specs).map(([k,v])=>`<li><strong>${k}</strong>: ${v}</li>`).join('')}</ul><h3>选购建议/避坑</h3><p>👍 ${p.pros}<br>⚠️ ${p.cons}</p><button id="detailAddCompare" class="btn-primary" data-id="${p.id}">➕ 加入对比</button>`;
        const modalDiv = document.getElementById("detailModalInner");
        modalDiv.innerHTML = details;
        document.getElementById("detailModal").style.display="flex";
        document.getElementById("detailAddCompare")?.addEventListener("click",()=>{ addToCompare(p.id); document.getElementById("detailModal").style.display="none"; });
    }

    function navigate(page){
        currentPage = page;
        let content = "";
        if(page==="home") content = renderHome();
        else if(page==="products") content = renderProductsPage();
        else if(page==="brands") content = renderBrands();
        else if(page==="guide") content = renderGuide();
        appRoot.innerHTML = content;
        if(page==="home"){ 
            attachProductEvents(); 
            initCarousel();
            document.querySelectorAll(".category-card").forEach(card=>{ card.addEventListener("click",(e)=>{ let cat = card.dataset.cat; if(cat){ document.getElementById("catSelectList") ? null : (navigate("products"), setTimeout(()=>{ if(document.getElementById("catSelectList")) document.getElementById("catSelectList").value=cat; refreshProductList();},100)); } }); });
        } else if(page==="products"){ refreshProductList(); attachProductEvents(); document.getElementById("catSelectList")?.addEventListener("change",refreshProductList); document.getElementById("brandSelectList")?.addEventListener("change",refreshProductList); document.getElementById("sortSelectList")?.addEventListener("change",refreshProductList);}
        else attachProductEvents();
        document.querySelectorAll(".nav-links a").forEach(link=>{ link.classList.remove("active"); if(link.dataset.page===page) link.classList.add("active"); });
    }
    function initCarousel(){
        let idx=0; const slides = document.getElementById("carouselSlides"); if(!slides) return;
        setInterval(()=>{ idx=(idx+1)%3; slides.style.transform=`translateX(-${idx*33.333}%)`; }, 4000);
    }
    document.querySelectorAll(".nav-links a").forEach(link=>{ link.addEventListener("click",(e)=>{ e.preventDefault(); navigate(link.dataset.page); }); });
    navigate("home");
    window.addEventListener("click",(e)=>{ if(e.target.classList.contains("modal")) e.target.style.display="none"; });
</script>
